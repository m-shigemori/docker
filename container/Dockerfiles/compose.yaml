x-base: &base
  build:
    context: .
    dockerfile: Dockerfile
    args:
      LOCAL_UID: ${LOCAL_UID}
      LOCAL_GID: ${LOCAL_GID}
      ROS_DOMAIN_ID: 53
      ROS_DISTRO: ${ROS_DISTRO}
  image: ${IMAGE_NAME}
  container_name: ${PARENT_DIR_NAME}
  network_mode: host
  privileged: true
  shm_size: 2g
  user: "${LOCAL_UID}:${LOCAL_GID}"
  environment:
    - DISPLAY=${DISPLAY}
    - CONTAINER_NAME=${PARENT_DIR_NAME}
    - PULSE_SERVER=unix:/run/user/${LOCAL_UID}/pulse/native
    - PATH=/home/sobits/.local/bin:$PATH
  volumes:
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - /run/user/${LOCAL_UID}/pulse:/run/user/${LOCAL_UID}/pulse
    - /etc/machine-id:/etc/machine-id:ro
    - /dev:/dev
    - ../src:/home/sobits/colcon_ws/src:rw
    - ~/.ssh:/home/sobits/.ssh:ro
    - ~/.config/gh:/home/sobits/.config/gh:rw
    - ~/.gitconfig:/home/sobits/.gitconfig:rw
  stdin_open: true
  tty: true

services:
  ros2_cpu:
    <<: *base
    profiles: ["cpu"]

  ros2_gpu:
    <<: *base
    profiles: ["gpu"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]